<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — The Blueprint Co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8f9fa;
            --border: #dee2e6;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --radius: 8px;
            --font-heading: 'Merriweather', Georgia, serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a { color: var(--primary); text-decoration: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; text-align: center; }
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        .header .container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .logo-text {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 900;
        }
        .logo-text span {
            display: block;
            font-family: var(--font-body);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }
        .error-code {
            font-family: var(--font-heading);
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
            line-height: 1;
        }
        .error-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 16px;
            color: var(--text);
        }
        .error-message {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
            max-width: 500px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
            margin: 0 8px;
        }
        .btn:hover {
            background: var(--primary-hover);
        }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container">
            The Blueprint Co. — Page Not Found
        </div>
    </div>

    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">B</div>
                <div class="logo-text">The Blueprint Co.</div>
            </a>
        </div>
    </header>

    <main class="main-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Blueprint Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved.<br>
            Let's get you back to the stories that matter.
        </p>
        <div>
            <a href="index.html" class="btn">Return Home</a>
            <a href="https://theblueprintco.github.io/blog" class="btn btn-outline">Browse Articles</a>
        </div>
    </main>

    <footer class="footer">
        <div class="container">© 2026 The Blueprint Co. — All content by The Blueprint Co. Team</div>
    </footer>
</body>
</html>
